  <text x="364" y="466" font-size="9" font-weight="600" fill="#0C447C">PDF</text>
  <text x="396" y="466" font-size="11" fill="#1a1a2e">Partnering Profile Quality Guidelines v1.2.pdf</text>
  <line x1="356" y1="486" x2="848" y2="486" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="360" y="506" font-size="10.5" fill="#4A5568">Tu wgrywamy guidelines — stają się trwałym kontekstem projektu</text>
  <text x="360" y="520" font-size="10.5" fill="#4A5568">i są dostępne w każdej rozmowie bez ponownego załączania pliku.</text>
