  <text x="372" y="208" font-size="10.5" fill="#1a1a2e">Dostosowanie do pól wyboru (dropdown) w systemie</text>
  <text x="372" y="234" font-size="10" fill="#4A5568" font-style="italic">Market Keywords → Appendix A · Technology Keywords → Appendix B (Merlin Client User Guide)</text>

  <!-- Panel dolny prawy — Źródła/Guidelines -->
